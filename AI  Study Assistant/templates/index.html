<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Study Assistant</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 8px 30px rgba(0,0,0,0.1); width: 100%; max-width: 700px; }
        h1 { color: #1a73e8; text-align: center; margin-bottom: 30px; }
        label { font-weight: bold; display: block; margin-bottom: 5px; color: #5f6368; }
        input[type="password"], textarea { width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #dadce0; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 15px; background-color: #1a73e8; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 18px; font-weight: bold; transition: background 0.3s; }
        button:hover { background-color: #1765cc; }
        .result-container { margin-top: 30px; padding: 20px; background-color: #f8f9fa; border-radius: 10px; border-left: 6px solid #1a73e8; }
        .result-text { white-space: pre-wrap; color: #3c4043; line-height: 1.6; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📚 AI Study Assistant</h1>
        <form method="POST">
            <label>Gemini API Key:</label>
            <input type="password" name="api_key" placeholder="Paste your API key here..." required>
            
            <label>Your Question:</label>
            <textarea name="question" rows="5" placeholder="Ask anything about Electronics or Telecommunications..." required>{{ question }}</textarea>
            
            <button type="submit">Get Answer</button>
        </form>

        {% if answer %}
        <div class="result-container">
            <h3>Answer:</h3>
            <div class="result-text">{{ answer | safe }}</div> ```
        </div>
        {% endif %}
    </div>
</body>
</html>
